<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhận Thưởng</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #11141c; color: #ffffff; }
        .card { background: #1c212e; padding: 50px; border-radius: 15px; border: 1px solid #30364d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 350px; }
        h1 { font-size: 24px; margin-bottom: 20px; }
        p { color: #a0a0a0; margin-bottom: 30px; }
        .btn { padding: 15px 40px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: transform 0.2s; text-transform: uppercase; width: 100%; }
        #btn-action { background-color: #28a745; color: white; }
        #btn-action:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hệ thống nhận thưởng</h1>
        <p id="status-text">Đang kiểm tra...</p>
        <button id="btn-action" class="btn" style="display:none;">Thực hiện</button>
    </div>

    <script>
        const API_BASE_URL = "https://URL-BACKEND-CUA-BAN.com"; 
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user');
        const token = urlParams.get('token');
        const btnAction = document.getElementById('btn-action');
        const statusText = document.getElementById('status-text');

        async function verifyReward() {
            statusText.innerText = "Đang gửi yêu cầu nhận thưởng...";
            try {
                const res = await fetch(`${API_BASE_URL}/api/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, token })
                });
                const data = await res.json();
                if (data.status === "success") {
                    statusText.innerText = "Thành công! Đang chuyển hướng...";
                    setTimeout(() => window.location.href = 'https://google.com', 2000);
                } else {
                    statusText.innerText = "Lỗi xác thực!";
                }
            } catch (err) {
                statusText.innerText = "Lỗi kết nối máy chủ!";
            }
        }

        async function init() {
            if (!userId) { statusText.innerText = "Thiếu thông tin!"; return; }
            try {
                const res = await fetch(`${API_BASE_URL}/api/check-link/${userId}`);
                const data = await res.json();

                if (data.linked) {
                    // Đã liên kết: Tự động nhận quà
                    verifyReward();
                } else {
                    // Chưa liên kết: Bắt liên kết
                    statusText.innerText = "Bạn cần liên kết Discord để nhận quà.";
                    btnAction.innerText = "Liên kết Discord";
                    btnAction.style.display = "block";
                    btnAction.onclick = () => {
                        window.location.href = "https://discord.com/api/oauth2/authorize?client_id=1401137325043617922&redirect_uri=https%3A%2F%2Fhphonggg.github.io%2Fnhan-thuong%2F&response_type=code&scope=identify";
                    };
                }
            } catch (e) { statusText.innerText = "Lỗi kết nối máy chủ!"; }
        }

        init();
    </script>
</body>
</html>

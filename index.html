<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Nhận Thưởng - YeuMoney</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a, #1e2937); }
    .glass { background: rgba(255,255,255,0.09); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.12); }
  </style>
</head>
<body class="min-h-screen text-white flex items-center justify-center p-4">
  <div class="max-w-md w-full glass rounded-3xl p-10 shadow-2xl text-center" id="mainContent">
    <div id="loading"><div class="animate-spin w-12 h-12 border-4 border-yellow-400 border-t-transparent rounded-full mx-auto"></div></div>
    <div id="success" class="hidden">
      <h1 class="text-4xl font-bold">Nhận Thưởng</h1>
      <button id="discordBtn" onclick="linkDiscord()" class="w-full bg-[#5865F2] py-4 rounded-xl mt-6 hidden">LIÊN KẾT DISCORD</button>
      <button id="claimBtn" onclick="claimReward()" class="hidden w-full bg-yellow-500 py-4 rounded-xl mt-6">NHẬN THƯỞNG</button>
    </div>
  </div>

  <script>
    const userId = new URLSearchParams(window.location.search).get('user');

    async function checkStatus() {
      const res = await fetch(`http://localhost:3000/api/check-link/${userId}`);
      const data = await res.json();
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('success').classList.remove('hidden');
      if (data.linked) {
        document.getElementById('claimBtn').classList.remove('hidden');
      } else {
        document.getElementById('discordBtn').classList.remove('hidden');
      }
    }

    async function linkDiscord() {
      await fetch('http://localhost:3000/api/link-discord', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({userId}) });
      location.reload();
    }

    async function claimReward() {
      await fetch('http://localhost:3000/api/verify', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({userId}) });
      window.location.href = 'https://google.com';
    }

    window.onload = checkStatus;
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhận Thưởng</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #11141c; color: #ffffff; }
        .card { background: #1c212e; padding: 50px; border-radius: 15px; border: 1px solid #30364d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 350px; }
        h1 { font-size: 24px; margin-bottom: 20px; }
        p { color: #a0a0a0; margin-bottom: 30px; }
        .btn { padding: 15px 40px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: transform 0.2s, background-color 0.2s; text-transform: uppercase; width: 100%; margin-bottom: 15px; }
        #btn-nhan { background-color: #28a745; color: white; }
        #btn-nhan:hover { background-color: #218838; transform: scale(1.05); }
        #btn-roi { background-color: #555; color: #ccc; cursor: not-allowed; }
        #btn-roi.active { background-color: #dc3545; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Chúc mừng bạn!</h1>
        <p id="status-text">Đang kiểm tra trạng thái...</p>
        <button id="btn-nhan" class="btn" style="display:none;">Nhận Lúa 🌾</button>
        <button id="btn-roi" class="btn" disabled>Rời khỏi</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user');
        const token = urlParams.get('token');
        const btnNhan = document.getElementById('btn-nhan');
        const statusText = document.getElementById('status-text');

        async function init() {
            try {
                // Kiểm tra xem user đã liên kết chưa
                const res = await fetch(`https://bot-cua-ban.com/api/check-link/${userId}`);
                const data = await res.json();

                if (data.linked) {
                    statusText.innerText = "Nhận Lúa Ngay 🌾";
                    btnNhan.style.display = "block";
                } else {
                    statusText.innerText = "Bạn chưa liên kết Discord!";
                    btnNhan.innerText = "Liên kết Discord";
                    btnNhan.style.display = "block";
                    btnNhan.onclick = () => {
                        // Chuyển hướng tới trang đăng nhập Discord của bạn
                        window.location.href = "https://discord.com/api/oauth2/authorize?client_id=1401137325043617922&redirect_uri=https%3A%2F%2Fhphonggg.github.io%2Fnhan-thuong%2F&response_type=code&scope=identify";
                    };
                }
            } catch (e) { statusText.innerText = "Lỗi tải dữ liệu!"; }
        }

        btnNhan.addEventListener('click', async () => {
            // Nếu đã liên kết thì thực hiện nhận thưởng
            const res = await fetch('https://bot-cua-ban.com/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, token })
            });
            const data = await res.json();
            if (data.status === "success") {
                alert("Đã gửi yêu cầu nhận thưởng!");
                btnNhan.disabled = true;
                const btnRoi = document.getElementById('btn-roi');
                btnRoi.disabled = false;
                btnRoi.classList.add('active');
                btnRoi.onclick = () => window.location.href = 'https://google.com';
            }
        });

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Reward Portal</title>
    <style>
        body { background: #0a0a0c; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .box { text-align: center; padding: 40px; background: #16161a; border-radius: 20px; }
        .btn { padding: 15px 30px; background: #5865F2; color: white; border-radius: 10px; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <div class="box">
        <h2 id="title">Reward System</h2>
        <div id="action">Đang kiểm tra...</div>
    </div>
    <script>
        const CLIENT_ID = '1401137325043617922';
        const REDIRECT_URI = 'https://hphonggg.github.io/nhan-thuong/';
        
        const fragment = new URLSearchParams(window.location.hash.slice(1));
        const accessToken = fragment.get('access_token');
        
        if (!accessToken) {
            document.getElementById('action').innerHTML = 
                `<a href="https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify" class="btn">Liên kết Discord</a>`;
        } else {
            document.getElementById('title').innerText = "Đã xác thực!";
            document.getElementById('action').innerHTML = `<button class="btn" onclick="alert('Đang trao quà...')">Nhận Thưởng</button>`;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Nhận Thưởng - YeuMoney</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a, #1e2937); }
    .glass { background: rgba(255,255,255,0.09); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.12); }
  </style>
</head>
<body class="min-h-screen text-white flex items-center justify-center p-4">
  <div class="max-w-md w-full glass rounded-3xl p-10 shadow-2xl text-center" id="mainContent">
    <div id="loading"><p>Đang kiểm tra...</p></div>
    <div id="error" class="hidden"><p>Link không hợp lệ.</p></div>
    <div id="success" class="hidden">
      <h1 class="text-4xl font-bold mb-4">Nhận Thưởng</h1>
      <button onclick="linkDiscord()" id="discordBtn" class="w-full bg-[#5865F2] py-4 rounded-xl">LIÊN KẾT DISCORD</button>
      <button onclick="claimReward()" id="claimBtn" class="hidden w-full bg-yellow-500 py-4 rounded-xl">NHẬN THƯỞNG</button>
    </div>
  </div>

  <script>
    const BOT_API_URL = "http://localhost:3000/api/verify";

    function linkDiscord() {
      // Thay bằng link OAuth2 của bạn
      localStorage.setItem('discord_linked', 'true');
      document.getElementById('discordBtn').classList.add('hidden');
      document.getElementById('claimBtn').classList.remove('hidden');
    }

    async function claimReward() {
      const userId = new URLSearchParams(window.location.search).get('user');
      await fetch(BOT_API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId}) });
      document.getElementById('claimBtn').innerHTML = "ĐÃ NHẬN THƯỞNG";
      document.getElementById('claimBtn').onclick = () => window.location.href = 'https://google.com';
    }

    window.onload = () => {
      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('success').classList.remove('hidden');
        if (localStorage.getItem('discord_linked') === 'true') {
          document.getElementById('discordBtn').classList.add('hidden');
          document.getElementById('claimBtn').classList.remove('hidden');
        }
      }, 800);
    };
  </script>
</body>
</html>

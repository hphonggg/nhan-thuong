<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống nhận thưởng</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #11141c; color: #ffffff; }
        .card { background: #1c212e; padding: 40px; border-radius: 15px; border: 1px solid #30364d; text-align: center; width: 350px; }
        #status-text { font-size: 1.2em; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="status-text">Đang xác thực...</h1>
    </div>

    <script>
        const API_BASE_URL = "[https://bot.cyerox.fun:3055](https://bot.cyerox.fun:3055)"; 
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user');
        const token = urlParams.get('token');
        const statusText = document.getElementById('status-text');

        async function verify() {
            if (!userId || !token) {
                statusText.innerText = "Thiếu thông tin xác thực!";
                return;
            }
            try {
                const res = await fetch(`${API_BASE_URL}/api/verify`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ userId, token })
                });
                const data = await res.json();
                if(data.status === "success") {
                    statusText.innerText = "✅ Thành công! Đang chờ duyệt...";
                } else {
                    statusText.innerText = "❌ Lỗi xác thực!";
                }
            } catch (err) {
                statusText.innerText = "❌ Lỗi kết nối máy chủ!";
            }
        }
        verify();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống nhận thưởng</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #11141c; color: #ffffff; }
        .card { background: #1c212e; padding: 40px; border-radius: 15px; border: 1px solid #30364d; text-align: center; width: 350px; }
        .btn { padding: 15px; border: none; border-radius: 8px; cursor: pointer; background: #28a745; color: white; width: 100%; font-weight: bold; margin-top: 20px; text-transform: uppercase; }
        .btn:hover { background: #218838; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="status-text">Đang kiểm tra...</h1>
        <button id="btn-action" class="btn" style="display:none;">Liên kết Discord</button>
    </div>

    <script>
        // Đã cập nhật link kết nối từ Localtunnel
        const API_BASE_URL = "https://lemon-bees-taste.loca.lt"; 
        
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user');
        const token = urlParams.get('token');
        const code = urlParams.get('code');
        const statusText = document.getElementById('status-text');
        const btnAction = document.getElementById('btn-action');

        async function init() {
            // 1. Xử lý sau khi người dùng liên kết xong (có code trả về)
            if (code && userId) {
                statusText.innerText = "Đang xác thực...";
                const res = await fetch(`${API_BASE_URL}/api/auth`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ code, userId })
                });
                if ((await res.json()).status === "success") {
                    window.location.href = window.location.pathname + `?user=${userId}&token=${token}`;
                }
                return;
            }

            // 2. Kiểm tra nếu thiếu ID
            if (!userId) { statusText.innerText = "Thiếu thông tin người dùng!"; return; }
            
            try {
                // 3. Kiểm tra xem đã liên kết chưa
                const res = await fetch(`${API_BASE_URL}/api/check-link/${userId}`);
                const data = await res.json();

                if (data.linked) {
                    // Đã liên kết: Tự động gửi yêu cầu nhận thưởng
                    statusText.innerText = "Đang nhận quà...";
                    const verify = await fetch(`${API_BASE_URL}/api/verify`, { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ userId, token })
                    });
                    if ((await verify.json()).status === "success") {
                        statusText.innerText = "Thành công! Đang chuyển hướng...";
                        setTimeout(() => window.location.href = 'https://google.com', 1500);
                    } else {
                        statusText.innerText = "Lỗi xác thực thưởng!";
                    }
                } else {
                    // Chưa liên kết: Hiện nút liên kết
                    statusText.innerText = "Bạn chưa liên kết Discord.";
                    btnAction.style.display = "block";
                    btnAction.onclick = () => {
                        window.location.href = `https://discord.com/api/oauth2/authorize?client_id=1401137325043617922&redirect_uri=https%3A%2F%2Fhphonggg.github.io%2Fnhan-thuong%2F&response_type=code&scope=identify&state=${userId}`;
                    };
                }
            } catch (err) {
                statusText.innerText = "Lỗi kết nối máy chủ!";
            }
        }
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nhận Thưởng - YeuMoney</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #0f172a, #1e2937); }
    .glass { background: rgba(255,255,255,0.09); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.12); }
  </style>
</head>
<body class="min-h-screen text-white flex items-center justify-center p-4">
  <div class="max-w-md w-full glass rounded-3xl p-10 shadow-2xl text-center" id="mainContent">
    
    <div id="loading" class="hidden">
      <div class="animate-spin w-12 h-12 border-4 border-yellow-400 border-t-transparent rounded-full mx-auto mb-6"></div>
      <p>Đang kiểm tra quyền truy cập...</p>
    </div>

    <div id="error" class="hidden">
      <i class="fas fa-ban text-6xl text-red-500 mb-6"></i>
      <h1 class="text-3xl font-bold text-red-400">Truy cập bị từ chối</h1>
      <p class="text-gray-400 mt-4">Link này không hợp lệ hoặc đã hết hạn.<br>Vui lòng dùng lệnh /vuotlink trong Discord để lấy link mới.</p>
    </div>

    <div id="success" class="hidden">
      <i class="fas fa-gift text-7xl text-yellow-400 mb-6"></i>
      <h1 class="text-4xl font-bold">Nhận Thưởng</h1>
      <p class="text-gray-400 mt-3">YeuMoney</p>

      <button onclick="claimReward()" 
              class="w-full mt-10 bg-gradient-to-r from-yellow-400 to-orange-500 hover:from-yellow-500 hover:to-orange-600 
                     transition-all py-6 rounded-2xl text-2xl font-bold shadow-xl flex items-center justify-center gap-4 text-black">
        <i class="fas fa-hand-holding-dollar text-3xl"></i>
        NHẬN THƯỞNG
      </button>
    </div>
  </div>

  <script>
    function hasValidParam() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.has('t') || urlParams.has('token');
    }

    async function claimReward() {
      const resultDiv = document.createElement('div');
      resultDiv.className = "mt-8 glass rounded-2xl p-8";
      resultDiv.innerHTML = `
        <div class="text-center">
          <div class="animate-spin w-12 h-12 border-4 border-green-400 border-t-transparent rounded-full mx-auto mb-6"></div>
          <p class="text-xl">Đang xử lý yêu cầu nhận thưởng...</p>
        </div>
      `;
      document.getElementById('mainContent').appendChild(resultDiv);

      await new Promise(r => setTimeout(r, 1500));

      resultDiv.innerHTML = `
        <div class="text-center">
          <i class="fas fa-check-circle text-6xl text-green-400 mb-5"></i>
          <p class="text-2xl font-semibold text-green-400">Nhận thưởng thành công!</p>
          <p class="text-gray-300 mt-4">Cảm ơn bạn đã tham gia.</p>
        </div>
      `;
    }

    window.onload = () => {
      document.getElementById('loading').classList.remove('hidden');

      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');

        if (hasValidParam()) {
          document.getElementById('success').classList.remove('hidden');
        } else {
          document.getElementById('error').classList.remove('hidden');
        }
      }, 800);
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Claim Rewards | System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: #0a0a0c;
            background-image: radial-gradient(circle at 20% 30%, #1a1a2e 0%, transparent 50%),
                              radial-gradient(circle at 80% 70%, #16213e 0%, transparent 50%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            background: rgba(18, 18, 22, 0.7);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            transition: 0.5s;
        }

        h2 { color: #fff; font-size: 2rem; margin-bottom: 10px; }
        p { color: #a0a0a0; margin-bottom: 30px; font-weight: 300; }

        .btn {
            padding: 18px 40px;
            border-radius: 15px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border: none;
            transition: 0.4s;
            width: 100%;
            color: #fff;
        }

        /* Nút Liên kết - Màu Tím Discord */
        .btn-link { background: linear-gradient(135deg, #7289da, #5865F2); box-shadow: 0 0 20px rgba(88, 101, 242, 0.4); }
        .btn-link:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(88, 101, 242, 0.6); }

        /* Nút Nhận thưởng - Màu Neon Xanh lá */
        .btn-claim { background: linear-gradient(135deg, #00f2fe, #4facfe); box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); }
        .btn-claim:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 242, 254, 0.6); }

        /* Hiệu ứng trôi nổi nhẹ */
        .container:hover { transform: translateY(-5px); border-color: rgba(88, 101, 242, 0.3); }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="title">Reward System</h2>
        <p id="desc">Vui lòng xác thực tài khoản để tiếp tục</p>
        <div id="action-area"></div>
    </div>

    <script>
        const fragment = new URLSearchParams(window.location.hash.slice(1));
        const accessToken = fragment.get('access_token');
        const actionArea = document.getElementById('action-area');
        const title = document.getElementById('title');
        const desc = document.getElementById('desc');

        if (!accessToken) {
            actionArea.innerHTML = `<button class="btn btn-link" onclick="window.location.href='https://discord.com/api/oauth2/authorize?client_id=YOUR_ID&redirect_uri=YOUR_URL&response_type=token&scope=identify'">Liên kết Discord</button>`;
        } else {
            title.innerText = "Sẵn sàng!";
            desc.innerText = "Chào mừng thành viên, nhấn để nhận thưởng ngay.";
            actionArea.innerHTML = `<button class="btn btn-claim" onclick="alert('Đã nhận!')">Nhận Thưởng</button>`;
        }
    </script>
</body>
</html>
